name: Run Robot Framework Tests

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente di test da verificare'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      execution_date: ${{ steps.set_date.outputs.execution_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Robot Framework and dependencies
        run: pip install robotframework robotframework-browser

      - name: Initialize Playwright browsers
        run: rfbrowser init chromium

      - name: Set execution date
        id: set_date
        run: echo "execution_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Run tests
        run: robot --outputdir report tests/

      - name: Add execution date to report.html
        run: |
          sed -i "s|<title>.*</title>|<title>Robot Framework Report - ${{ steps.set_date.outputs.execution_date }}</title>|" report/report.html
          sed -i "s|<body>|<body>\n<div style=\"background:#f0f0f0;padding:10px;margin:10px;border-radius:4px;font-family:Arial,sans-serif;\"><strong>Esecuzione del:</strong> ${{ steps.set_date.outputs.execution_date }}</div>|" report/report.html
        continue-on-error: true

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: report/
          retention-days: 30

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: robot-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4