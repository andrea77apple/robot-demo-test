name: Run Robot Framework Tests

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente di test da verificare'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      date_folder: ${{ steps.datefolder.outputs.date_folder }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Robot Framework
        run: pip install robotframework

      - name: Set date folder
        id: datefolder
        run: echo "date_folder=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Run tests
        run: robot --outputdir results/${{ steps.datefolder.outputs.date_folder }} tests/
        continue-on-error: true

      - name: Copy index.html to report folder
        run: cp docs/index-template.html results/${{ steps.datefolder.outputs.date_folder }}/index.html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report-${{ steps.datefolder.outputs.date_folder }}
          path: results/${{ steps.datefolder.outputs.date_folder }}/
          retention-days: 30

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: robot-report-${{ needs.test.outputs.date_folder }}
          path: results/${{ needs.test.outputs.date_folder }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/${{ needs.test.outputs.date_folder }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4