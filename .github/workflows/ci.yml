name: Run Robot Framework Tests

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente di test da verificare'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Robot Framework
        run: pip install robotframework

      - name: Run tests
        run: robot --outputdir report tests/
        continue-on-error: true

      - name: Create run directory and copy files
        run: |
          mkdir -p run
          cp -r report/* run/

      - name: Check if there are changes
        id: check_changes
        run: |
          if git diff --quiet run/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to run directory
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@github.com"
          git add run/
          git commit -m "Update run folder - ${{ github.run_id }}"
          git push origin master

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: report/
          retention-days: 30

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: robot-report
          path: report

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4